# The only theme that was made by me was the hacker one
# The rest were either found at https://github.com/dexpota/kitty-themes
# Or https://github.com/catppuccin/kitty

font_family FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11

scrollback_lines 1000

allow_remote_control yes

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

font_family MesloLGS NF
include ~/.config/kitty/CatppuccinMocha.conf
